<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OpenKai</title>
  <link rel="stylesheet" href="style.css?v=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <!-- 🖥️ OVERLAY INICIAL (TIPO SISTEMA) -->
  <div id="overlayKai">
    <p>Inicializando sistema K.A.I...</p>
  </div>

  <!-- 🧠 SISTEMA KAI -->
  <div class="intro" id="intro">

    <div class="kai-container" id="kaiContainer">
      <div id="circulo">
        <span class="kai-text" id="kaiText">K.A.I</span>
      </div>
    </div>

    <!-- 🎬 INTRO AUDIO -->
    <video id="introAudio" muted playsinline style="display:none">
      <source src="audio/kai-activate.mp4" type="video/mp4">
    </video>

    <!-- 🔘 BOTÓN (aparece después) -->
    <button id="btnKai" onclick="iniciarKai()">
      ACTIVAR K.A.I
    </button>

    <p id="texto"></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
